# The name of benchmarking/config using TPBench BenchScore mode
TP_BenchScoreName=ICX6330
TP_BenchScoreConfig=Xeon6330_default

# Platform info
TP_NSockPerNode=2
TP_NCorePerSock=64

# Cache size PER CORE in KiB
TP_CacheSize=32:2048:4096

# For a formal benchmark, DO NOT modify the following parameters.
TP_SubSysName=Computing_fp64
TP_SubSysKernels=d_fmaldr,d_mulldr
TP_SubSysName=Memory_fp64
TP_SubSysKernels=d_init,d_triad,d_axpy,d_striad
TP_SubSysName=Network_fp64
TP_SubSysKernels=d_sendrecv,d_bcast,d_alltoall