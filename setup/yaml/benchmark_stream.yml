# A key "benchmark" defines a benchmark suite.
benchmark:
  # name: The name of the benchmark suite.
  name: "streamx6_template"
  # note: The description of the benchmark suite.
  note: >
    This benchmark scores the system with eight stream benchmarks. These benchmarks
    are divded into four pairs, 
    
  # batch: A list of tests being run. The test is executed by the order of the list.
  batch:
    # id: A string which is the only index to tag the test
    # note: A string to explain this test.
    # kernel: The kernel's name.
    # kargs: The 2D array of --kargs for `tpbcli run`, each element is a key-value pair. 
    # v: The array that tells `tpb benchmark` what outputs being used
    #    The fist element is the output's name.
    #    The second element is the arithmetic applying to the result, in case it is a array.
    #    For a single point data, this setting will be ignored. For an array, all data will
    #    first be flatten to 1D, then apply the arithmetic. Current supported: "mean", "median",
    #    "max", "min", "Q=<quantile_number>". <quantile_number> is a decimal number in [0,100].
    - id: 8Kx1
      note: ""
      kernel: stream
      kargs: [["array_size", "1024"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 1"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 8Kx4
      note: ""
      kernel: stream
      kargs: [["array_size", "1024"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 4"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 48Kx1
      note: ""
      kernel: stream
      kargs: [["array_size", "6144"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 1"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 48Kx4
      note: ""
      kernel: stream
      kargs: [["array_size", "6144"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 4"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 1024Kx1
      note: ""
      kernel: stream
      kargs: [["array_size", "131072"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 1"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 1024Kx4
      note: ""
      kernel: stream
      kargs: [["array_size", "131072"], ["ntest", "100"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 4"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 524288Kx1
      note: ""
      kernel: stream
      kargs: [["array_size", "67108864"], ["ntest", "10"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 1"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]
    - id: 524288Kx4
      note: ""
      kernel: stream
      kargs: [["array_size", "67108864"], ["ntest", "10"], ["twarm", "100"]]
      kmpiargs: "--map-by core --bind-to core -np 4"
      v:
        - ["copy_bw_walltime", "mean"]
        - ["scale_bw_walltime", "mean"]
        - ["add_bw_walltime", "mean"]
        - ["triad_bw_walltime", "mean"]

  # score: The definition and calculation of benchmark score. 
  score:
    # id: String identifier tag.
    # name: The name of the score
    # display: 1 to display the result, 0 to hide. Set to 0 for intermediate value. 
    #          At least one score should be displayed.
    # modifier and args: For calculate current score, applying a modifier on args. 
    #                    The "@" means reference, use @<block>.<sub-block>[<key>==<value> or <index>]
    #                    to use the value of other scores or output values.
    # Supported modifiers:
    #   raw: The original number.
    #   sum: Sum of all args. 
    #   div: Starts from args[0], score=args[0]/args[1]/args[2]/...
    #   mul: args[0]*args[1]*...
    #   mean: Average of all args.
    - id: "0"
      name: "Final Score"
      display: 1
      modifier: "sum"
      args:
        - "@score[id==8K_copy]"
        - "@score[id==8K_scale]"
        - "@score[id==8K_add]"
        - "@score[id==8K_triad]"
        - "@score[id==48K_copy]"
        - "@score[id==48K_scale]"
        - "@score[id==48K_add]"
        - "@score[id==48K_triad]"
        - "@score[id==1024K_copy]"
        - "@score[id==1024K_scale]"
        - "@score[id==1024K_add]"
        - "@score[id==1024K_triad]"
        - "@score[id==524288K_copy]"
        - "@score[id==524288K_scale]"
        - "@score[id==524288K_add]"
        - "@score[id==524288K_triad]"
    - id: "8K_copy"
      modifier: "div"
      name: "4-rank copy bandwidth ratio single rank (8K)."
      display: 1
      args: 
        - "@batch[id=='8Kx4'].v[0]"
        - "@batch[id=='8Kx1'].v[0]"
    - id: "8K_scale"
      modifier: "div"
      name: "4-rank scale bandwidth ratio single rank (8K)."
      display: 1
      args: 
        - "@batch[id=='8Kx4'].v[1]"
        - "@batch[id=='8Kx1'].v[1]"
    - id: "8K_add"
      modifier: "div"
      name: "4-rank add bandwidth ratio single rank (8K)."
      display: 1
